<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="BOSS Associates crest">
  <defs>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E6C878"/>
      <stop offset="0.5" stop-color="#C6A15B"/>
      <stop offset="1" stop-color="#9C7A34"/>
    </linearGradient>
  </defs>
  <!-- Seal outer ring -->
  <circle cx="60" cy="60" r="56" fill="#0B2545"/>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#goldGrad)" stroke-width="2.5"/>
  <circle cx="60" cy="60" r="49" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.6"/>
  <!-- Ledger rule lines -->
  <line x1="24" y1="44" x2="96" y2="44" stroke="url(#goldGrad)" stroke-width="0.9" opacity="0.35"/>
  <line x1="24" y1="78" x2="96" y2="78" stroke="url(#goldGrad)" stroke-width="0.9" opacity="0.35"/>
  <!-- Monogram BA -->
  <text x="60" y="72" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" font-weight="700" letter-spacing="1" fill="url(#goldGrad)">BA</text>
  <!-- Microtype -->
  <text x="60" y="94" text-anchor="middle" font-family="Georgia, serif" font-size="7.5" letter-spacing="3" fill="#C6A15B">ASSOCIATES</text>
  <text x="60" y="34" text-anchor="middle" font-family="Georgia, serif" font-size="6.5" letter-spacing="2.5" fill="#C6A15B" opacity="0.85">EST · ATLANTA</text>
</svg>
